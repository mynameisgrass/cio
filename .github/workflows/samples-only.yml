name: Generate Samples Only
run-name: samples-${{ inputs.model }}-${{ inputs.start_index }}-${{ inputs.end_index }}

on:
  workflow_dispatch:
    inputs:
      model:
        description: Gemini model name
        required: false
        default: gemini-flash-latest
      max_docs:
        description: Max documents to distill (0 = all)
        required: false
        default: "80"
      start_index:
        description: Start index in corpus (0-based)
        required: false
        default: "0"
      end_index:
        description: End index in corpus (exclusive, 0 = until end)
        required: false
        default: "0"
      tasks_per_doc:
        description: Samples requested per document
        required: false
        default: "2"
      temperature:
        description: Sampling temperature
        required: false
        default: "0.2"
      sleep_sec:
        description: Delay between docs (seconds)
        required: false
        default: "0.12"
      max_retries:
        description: Retries per doc
        required: false
        default: "2"
      retry_sec:
        description: Base retry backoff (seconds)
        required: false
        default: "0.8"
      json_fix_retries:
        description: JSON repair retries
        required: false
        default: "1"
      max_samples_per_source:
        description: Max accepted samples per source file
        required: false
        default: "2"
      artifact_name:
        description: Artifact name for this run
        required: false
        default: generated-samples
      include_all_assets:
        description: Include all files in guidesnpdf/assets (not only keyword-matched)
        required: false
        type: boolean
        default: true
      include_compiler:
        description: Include compiler source files
        required: false
        type: boolean
        default: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: Production
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ml/requirements-ci.txt

      - name: Validate API key secret
        run: |
          if [ -z "${GEMINI_API_KEY}" ]; then
            echo "::error::Missing GEMINI_API_KEY secret in environment Production (or repository secrets)."
            exit 1
          fi

      - name: Extract corpus
        run: |
          set -euo pipefail
          EXTRACT_ARGS=(
            --assets-dir guidesnpdf/assets
            --compiler-dir compiler
            --output-dir ml/data/raw_ci
          )

          if [ "${{ inputs.include_all_assets }}" = "true" ]; then
            EXTRACT_ARGS+=(--include-all)
          fi

          if [ "${{ inputs.include_compiler }}" != "true" ]; then
            EXTRACT_ARGS+=(--no-compiler)
          fi

          python ml/scripts/extract_game_corpus.py "${EXTRACT_ARGS[@]}"

      - name: Distill samples only
        run: |
          set -euo pipefail
          python ml/scripts/distill_with_gemini.py \
            --input ml/data/raw_ci/game_corpus.jsonl \
            --output ml/data/distill/sft_candidates_ci.jsonl \
            --model "${{ inputs.model }}" \
            --max-docs "${{ inputs.max_docs }}" \
            --start-index "${{ inputs.start_index }}" \
            --end-index "${{ inputs.end_index }}" \
            --tasks-per-doc "${{ inputs.tasks_per_doc }}" \
            --temperature "${{ inputs.temperature }}" \
            --max-samples-per-source "${{ inputs.max_samples_per_source }}" \
            --sleep-sec "${{ inputs.sleep_sec }}" \
            --max-retries "${{ inputs.max_retries }}" \
            --retry-sec "${{ inputs.retry_sec }}" \
            --json-fix-retries "${{ inputs.json_fix_retries }}"

      - name: Count generated samples
        id: count
        run: |
          set -euo pipefail
          count=$(wc -l < ml/data/distill/sft_candidates_ci.jsonl || echo 0)
          echo "samples=${count}" >> "$GITHUB_OUTPUT"

      - name: Read distill stats
        id: stats
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("ml/data/distill/sft_candidates_ci.stats.json")
          data = json.loads(path.read_text(encoding="utf-8"))

          fields = {
              "input_docs": data.get("input_docs", 0),
              "attempted_docs": data.get("attempted_docs", 0),
              "processed_docs": data.get("processed_docs", 0),
              "failed_docs": data.get("failed_docs", 0),
              "selected_docs": data.get("selected_docs", 0),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in fields.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ml/data/raw_ci/game_corpus_stats.json
            ml/data/distill/sft_candidates_ci.jsonl
            ml/data/distill/sft_candidates_ci.stats.json

      - name: Write summary
        run: |
          {
            echo "## Samples Generation Complete"
            echo ""
            echo "- Model: ${{ inputs.model }}"
            echo "- Max docs: ${{ inputs.max_docs }}"
            echo "- Start index: ${{ inputs.start_index }}"
            echo "- End index: ${{ inputs.end_index }}"
            echo "- Tasks per doc: ${{ inputs.tasks_per_doc }}"
            echo "- Temperature: ${{ inputs.temperature }}"
            echo "- Sleep sec: ${{ inputs.sleep_sec }}"
            echo "- Max retries: ${{ inputs.max_retries }}"
            echo "- Retry sec: ${{ inputs.retry_sec }}"
            echo "- JSON fix retries: ${{ inputs.json_fix_retries }}"
            echo "- Max samples/source: ${{ inputs.max_samples_per_source }}"
            echo "- Input docs: ${{ steps.stats.outputs.input_docs }}"
            echo "- Selected docs: ${{ steps.stats.outputs.selected_docs }}"
            echo "- Attempted docs: ${{ steps.stats.outputs.attempted_docs }}"
            echo "- Processed docs: ${{ steps.stats.outputs.processed_docs }}"
            echo "- Failed docs: ${{ steps.stats.outputs.failed_docs }}"
            echo "- Samples generated: ${{ steps.count.outputs.samples }}"
            echo "- Artifact: ${{ inputs.artifact_name }}"
          } >> "$GITHUB_STEP_SUMMARY"
